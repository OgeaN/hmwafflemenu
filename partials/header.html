<!-- MOBILE APP DRAWER -->
<div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-top">
        <div class="header-brand">
            <img src="assets/menu-images/hmwaffle.png" alt="HM" class="header-logo"><span class="text-yellow">HM</span> WAFFLE
        </div>
        <button class="drawer-close" id="menuCloseBtn"><i class="ri-close-large-line"></i></button>
    </div>
    
    <nav class="drawer-links">
        <a href="index.html" class="nav-link">Keşfet</a>
        <a href="qrmenu.html" class="nav-link text-yellow">QR Menü</a>
        <a href="about.html" class="nav-link">Hakkımızda</a>
        <a href="galeri.html" class="nav-link">Galeri</a>
        <a href="location.html" class="nav-link">Konum</a>
    </nav>
</div>

<script>
    setTimeout(() => {
        const toggle = document.getElementById('menuOpenBtn');
        const close = document.getElementById('menuCloseBtn');
        const drawer = document.getElementById('mobileDrawer');
        const links = document.querySelectorAll('.nav-link');
        
        let pathName = window.location.pathname.split('/').pop() || 'index.html';
        if(pathName === '') pathName = 'index.html';

        if(toggle && close && drawer) {
            toggle.addEventListener('click', () => {
                drawer.classList.add('open');
                document.body.style.overflow = 'hidden';
            });
            close.addEventListener('click', () => {
                drawer.classList.remove('open');
                document.body.style.overflow = '';
            });
        }
        
        links.forEach(l => {
            if(l.getAttribute('href') === pathName) {
                l.classList.add('active');
            }
        });
    }, 150);
</script>
