<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM Waffle | Temassız Menü</title>
    <script src="assets/include.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div data-include="partials/header.html"></div>
    
    <main class="main-wrapper qr-layout">
        <div class="qr-header">
            <h1 class="h-title">Lezzet <span class="text-yellow">Menüsü.</span></h1>
            <p class="text-muted">Kategoriler arasında gezinerek size en uygun lezzeti seçin.</p>
        </div>
        
        <div id="category-tabs" class="category-tabs">
            <!-- JS tarafından doldurulacak -->
        </div>
        
        <div id="menu-list" class="qr-grid">
            <!-- JS tarafından doldurulacak -->
        </div>
    </main>

    <!-- Fullscreen Image Modal -->
    <div id="image-modal" class="image-modal">
        <button class="modal-close-btn" onclick="closeImageModal()"><i class="ri-close-line"></i></button>
        <img id="modal-img" class="modal-content" src="" alt="Ürün Görseli">
        <div id="modal-alt" class="modal-caption"></div>
    </div>

    <div data-include="partials/footer.html"></div>
    <script src="assets/menu.js"></script>
</body>
</html>
