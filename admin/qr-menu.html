<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Menü</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <nav class="sidebar" id="sidebar-container"></nav>
        <main class="main-content">
            <div class="qr-admin-header">
                <div>
                    <h1>QR Menü</h1>
                    <p class="qr-admin-hint">Değişiklikler müşterilerin gördüğü QR menüye anında yansır.</p>
                </div>
                <div class="qr-search-box">
                    <span class="qr-search-icon">🔍</span>
                    <input type="text" id="qr-search" placeholder="Ürün veya kategori ara...">
                </div>
            </div>

            <div class="qr-admin-grid">
                <!-- Sol: yeni ürün ekleme kartı -->
                <aside class="qr-add-card">
                    <h3>Yeni Ürün Ekle</h3>
                    <form id="add-qr-form">
                        <div class="qr-add-preview">
                            <img id="new-qr-image-preview" src="assets/menu-images/default.jpg" alt="Önizleme"
                                 onerror="this.src='assets/menu-images/default.jpg'">
                        </div>
                        <label class="qr-field-group">
                            <span>Ürün adı</span>
                            <input type="text" id="new-qr-name" required placeholder="Örn: Çikolatalı Waffle">
                        </label>
                        <div class="qr-field-row">
                            <label class="qr-field-group">
                                <span>Fiyat (₺)</span>
                                <input type="number" id="new-qr-price" step="0.01" min="0" value="0">
                            </label>
                            <label class="qr-field-group">
                                <span>Kategori</span>
                                <input type="text" id="new-qr-category" list="qr-category-list" required placeholder="Waffle">
                                <datalist id="qr-category-list"></datalist>
                            </label>
                        </div>
                        <label class="qr-field-group">
                            <span>Görsel (URL veya yol)</span>
                            <input type="text" id="new-qr-image" placeholder="https://... veya assets/menu-images/...">
                        </label>
                        <button type="submit" id="add-qr-btn" class="qr-add-btn">+ Ürünü Ekle</button>
                    </form>
                </aside>

                <!-- Sağ: kategoriye göre ürün kartları -->
                <div id="qr-menu-container">
                    <!-- JS tarafından doldurulacak -->
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/pages/qr-menu.js"></script>
    <script type="module" src="js/ui/sidebar.js"></script>
</body>
</html>
